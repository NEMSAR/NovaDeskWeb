<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaDesk | CMS Blog Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Firebase SDKs completos -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            --text-main: #1d1d1f; --text-muted: #86868b;
            --primary: #007aff; --danger: #ff3b30;
            --glass-bg: rgba(255, 255, 255, 0.8); --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-glass: 0 16px 40px rgba(0, 0, 0, 0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); padding: 3rem 5%; min-height: 100vh;}
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; font-weight: 800; }
        
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; box-shadow: var(--shadow-glass);
            max-width: 800px; margin: 0 auto 2rem auto;
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main); }
        .input-control {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02);
            font-size: 1rem; color: var(--text-main); outline: none; transition: 0.3s;
        }
        .input-control:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        textarea.input-control { min-height: 180px; resize: vertical; }

        .btn {
            padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer;
            border: none; background: var(--primary); color: #fff; font-size: 1rem;
            transition: 0.3s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover { background: #0056b3; transform: translateY(-2px); }
        .btn-danger { background: rgba(255,59,48,0.1); color: var(--danger); padding: 8px 16px; font-size: 0.9rem; width: auto;}
        .btn-danger:hover { background: var(--danger); color: #fff; }

        .post-list { display: grid; grid-template-columns: 1fr; gap: 1rem; max-width: 800px; margin: 0 auto; }
        .post-item {
            background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 16px;
            padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .post-title { font-weight: 800; font-size: 1.1rem; }

        /* Vistas */
        #login-view { display: block; max-width: 400px; margin: 10vh auto; }
        #cms-view { display: none; }
    </style>
</head>
<body>

    <!-- VISTA DE LOGIN -->
    <div id="login-view" class="glass-panel">
        <div class="header">
            <h1>CMS Admin</h1>
            <p>Inicia sesión para publicar</p>
        </div>
        <form id="login-form">
            <div class="input-group">
                <input type="email" id="admin-email" class="input-control" placeholder="Correo administrador" required>
            </div>
            <div class="input-group">
                <input type="password" id="admin-pass" class="input-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn" id="btn-login">Ingresar</button>
        </form>
    </div>

    <!-- VISTA DEL CMS -->
    <div id="cms-view">
        <div class="header">
            <h1><i class="bi bi-gear-fill text-primary"></i> CMS NovaDesk</h1>
            <p>Centro de publicaciones para actualizaciones.</p>
            <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; margin-top:10px;">Cerrar Sesión</button>
        </div>

        <div class="glass-panel">
            <h2 style="margin-bottom: 1.5rem; font-weight: 800;">Nueva Publicación</h2>
            <form id="blog-form">
                <div class="input-group">
                    <label>Título de la actualización</label>
                    <input type="text" id="post-title" class="input-control" placeholder="Ej: NUEVOS TAGS DE ESTADOS" required>
                </div>
                <div class="input-group">
                    <label>Etiqueta / Categoría</label>
                    <input type="text" id="post-tag" class="input-control" placeholder="Ej: Nueva Función" required>
                </div>
                <div class="input-group">
                    <label>Contenido (Soporta [img]url[/img] y saltos de línea)</label>
                    <textarea id="post-content" class="input-control" placeholder="Escribe los detalles aquí..." required></textarea>
                </div>
                <button type="submit" class="btn" id="btn-submit"><i class="bi bi-send-fill"></i> Publicar en la Web</button>
            </form>
        </div>

        <h2 style="text-align: center; margin-bottom: 1.5rem; font-weight: 800;">Historial de Publicaciones</h2>
        <div class="post-list" id="post-list"></div>
    </div>

    <script>
        // Inicialización de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCtMP_qBd_sj0W-30gZ_RcwmQc4tWyAEV4",
            authDomain: "novadesk-6ef66.firebaseapp.com",
            databaseURL: "https://novadesk-6ef66-default-rtdb.firebaseio.com",
            projectId: "novadesk-6ef66"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Control de Sesión
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('cms-view').style.display = 'block';
                cargarPosts();
            } else {
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('cms-view').style.display = 'none';
            }
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = "Autenticando..."; btn.disabled = true;
            auth.signInWithEmailAndPassword(document.getElementById('admin-email').value, document.getElementById('admin-pass').value)
                .catch(err => {
                    alert("Error: " + err.message);
                    btn.innerHTML = "Ingresar"; btn.disabled = false;
                });
        });

        // Guardar nueva publicación
        document.getElementById('blog-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = "Publicando..."; btn.disabled = true;

            const nuevoPost = {
                titulo: document.getElementById('post-title').value,
                etiqueta: document.getElementById('post-tag').value,
                contenido: document.getElementById('post-content').value,
                fecha: new Date().toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' }),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            // AQUÍ AGREGAMOS EL .catch() PARA SABER SI FALLA
            db.ref('landing_blog').push(nuevoPost).then(() => {
                alert('¡Publicación exitosa!');
                this.reset();
                btn.innerHTML = '<i class="bi bi-send-fill"></i> Publicar en la Web';
                btn.disabled = false;
            }).catch(error => {
                console.error(error);
                alert("Error de Firebase: " + error.message);
                btn.innerHTML = '<i class="bi bi-send-fill"></i> Publicar en la Web';
                btn.disabled = false;
            });
        });

        // Leer y mostrar publicaciones
        function cargarPosts() {
            db.ref('landing_blog').orderByChild('timestamp').on('value', (snap) => {
                const contenedor = document.getElementById('post-list');
                contenedor.innerHTML = '';
                if(snap.exists()){
                    let posts = [];
                    snap.forEach(child => { posts.push({ id: child.key, ...child.val() }); });
                    posts.reverse().forEach(post => {
                        contenedor.innerHTML += `
                            <div class="post-item">
                                <div>
                                    <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">${post.fecha} • ${post.etiqueta}</div>
                                    <div class="post-title">${post.titulo}</div>
                                </div>
                                <button class="btn btn-danger" onclick="borrarPost('${post.id}')"><i class="bi bi-trash"></i> Borrar</button>
                            </div>
                        `;
                    });
                }
            });
        }

        // Función para borrar
        window.borrarPost = function(id) {
            if(confirm('¿Seguro que deseas borrar esta publicación?')) {
                db.ref('landing_blog/' + id).remove();
            }
        }
    </script>
</body>
</html>
